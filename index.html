<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="description" content="Sport & Santé — Suivi programme prise de masse">
  <title>Sport & Santé</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header" class="hidden">
    <div class="header-left">
      <span id="header-week"></span>
      <span id="header-phase" class="badge"></span>
      <span id="header-version" class="header-version"></span>
    </div>
    <button id="btn-logout" title="Déconnexion">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </header>

  <main id="app"></main>

  <nav id="bottom-nav" class="hidden">
    <a href="#/dashboard" class="nav-item" data-view="dashboard">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Accueil</span>
    </a>
    <a href="#/workout" class="nav-item" data-view="workout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6.5 6.5h11M6 12h12M6.5 17.5h11M4 6.5V6a1 1 0 00-1 1v10a1 1 0 001 1v-.5M20 6.5V6a1 1 0 011 1v10a1 1 0 01-1 1v-.5"/>
      </svg>
      <span>Séance</span>
    </a>
    <a href="#/sleep" class="nav-item" data-view="sleep">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
      </svg>
      <span>Sommeil</span>
    </a>
    <a href="#/charts" class="nav-item" data-view="charts">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Stats</span>
    </a>
  </nav>

  <div id="offline-banner" class="hidden">Mode hors-ligne</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
