name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version and commit
        run: |
          TODAY="$(TZ=Europe/Paris date +%Y.%m.%d)"
          # Read current version to extract counter
          CURRENT=$(grep -oP "APP_VERSION = '\K[^']+" js/version.js || echo "")
          CURRENT_DATE=$(echo "$CURRENT" | grep -oP '^\d{4}\.\d{2}\.\d{2}' || echo "")
          CURRENT_NUM=$(echo "$CURRENT" | grep -oP '\d+$' || echo "0")
          # Increment or reset counter
          if [ "$CURRENT_DATE" = "$TODAY" ]; then
            NUM=$((CURRENT_NUM + 1))
          else
            NUM=1
          fi
          VERSION="${TODAY}-$(printf '%03d' $NUM)"
          echo "// Auto-updated by deploy workflow" > js/version.js
          echo "export const APP_VERSION = '${VERSION}';" >> js/version.js
          cat js/version.js
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add js/version.js
          git diff --cached --quiet && echo "No change" || git commit -m "chore: stamp version ${VERSION} [skip ci]"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
