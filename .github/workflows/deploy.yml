name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version
        run: |
          VERSION="$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          sed -i "s|APP_VERSION = 'DEV'|APP_VERSION = '${VERSION}'|" js/version.js
          echo "Version stamped: $VERSION"
          echo "--- version.js content ---"
          cat js/version.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
